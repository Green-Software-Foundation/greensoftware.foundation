name: Deploy PR (dev → main)

on:
  push:
    branches: [dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes and create/update Deploy PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if dev is ahead of main
          AHEAD=$(git rev-list --count origin/main..origin/dev)
          if [ "$AHEAD" -eq 0 ]; then
            echo "dev is not ahead of main — nothing to deploy."
            exit 0
          fi

          echo "dev is $AHEAD commit(s) ahead of main."

          # Check if a deploy PR already exists
          EXISTING_PR=$(gh pr list --base main --head dev --state open --json number --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "Deploy PR #$EXISTING_PR already exists — no action needed."
            exit 0
          fi

          # Determine next version number from previous deploy PRs
          LAST_VERSION=$(gh pr list --base main --head dev --state all --json title --jq '[.[].title | capture("Deploy v(?<v>[0-9]+)") | .v | tonumber] | max // 0')
          NEXT_VERSION=$((LAST_VERSION + 1))

          echo "Creating Deploy v$NEXT_VERSION PR..."

          BODY="## Deploy v${NEXT_VERSION}

          This PR merges \`dev\` into \`main\` to deploy staged changes to production.

          **Production site:** greensoftware.org
          **Staging site:** dev-green-software-org.netlify.app

          > Auto-created by the Deploy PR workflow. Review changes carefully before merging."

          PR_URL=$(gh pr create \
            --base main \
            --head dev \
            --title "Deploy v$NEXT_VERSION" \
            --body "$BODY")

          echo "Created PR: $PR_URL"

          # Request reviewers (non-fatal if user lacks repo access)
          gh pr edit "$PR_URL" --add-reviewer seanmcilroy29,JamieACowan || echo "Warning: could not add some reviewers"
