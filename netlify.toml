[build]
  command = "npm run build:full"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

[images]

# =============================================================================
# Redirects — legacy paths → new Astro paths
# =============================================================================

# -- Renamed pages --

[[redirects]]
from = "/team"
to = "/governance/"
status = 301

[[redirects]]
from = "/join-us"
to = "/membership/"
status = 301

[[redirects]]
from = "/helpdesk"
to = "/contact/"
status = 301

[[redirects]]
from = "/subscribe"
to = "/newsletter/"
status = 301

[[redirects]]
from = "/onboarding"
to = "https://wiki.greensoftware.foundation/orientation"
status = 301

[[redirects]]
from = "/projects"
to = "/standards/"
status = 301

[[redirects]]
from = "/projects/*"
to = "/standards/"
status = 301

[[redirects]]
from = "/manifesto"
to = "/about/"
status = 301

